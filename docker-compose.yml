version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: music-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: music_system
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - music-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: music-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - music-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: music-minio
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: 12345678
    ports:
      - "9000:9000"  # API端口
      - "9001:9001"  # 控制台端口
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - music-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  audio-analysis:
    image: python:3.11-slim
    container_name: music-audio-analysis
    working_dir: /app
    restart: always
    command: /bin/sh -c "apt-get update && apt-get install -y ffmpeg && pip install --no-cache-dir -r requirements.txt && uvicorn app:APP --host 0.0.0.0 --port 9008"
    ports:
      - "9008:9008"
    volumes:
      - ./python-audio-service:/app
    networks:
      - music-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  music-network:
    driver: bridge

