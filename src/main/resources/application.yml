# ==================== 应用配置 ====================
spring:
  application:
    name: PersonalMusicSystem
  # ==================== 数据库配置 ====================
  datasource:
    url: jdbc:mysql://localhost:3307/music_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      enabled: true
      max-file-size: 52428800
      max-request-size: 52428800
      file-size-threshold: 2097152
  # ==================== Redis配置 ====================
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1
  # ==================== AI服务配置 ====================
  ai:
    dashscope:
      api-key: sk-3492ee2339434c8cbd5ea0674de8eafb
      base-url: https://dashscope.aliyuncs.com
      chat:
        options:
          model: qwen-turbo
          temperature: 0.7
  # ==================== 邮件配置（QQ邮箱SMTP） ====================
  mail:
    host: smtp.qq.com
    port: 587
    username: 2521440844@qq.com  # 请替换为您的QQ邮箱地址
    password: igiuxwwnkxvedije  # 请替换为QQ邮箱授权码（不是密码）
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ==================== 服务器配置 ====================
server:
  port: 8080
  servlet:
    context-path: /

# ==================== MyBatis配置 ====================
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.personalmusicsystem.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ==================== JWT配置 ====================
jwt:
  secret: PersonalMusicSystemSecretKey2024ForJWTTokenGenerationMustBeLongEnoughForSecurity
  expiration: 86400000

# ==================== MinIO配置 ====================
minio:
  endpoint: http://10.37.233.91:9000
  access-key: admin
  secret-key: 12345678
  bucket-name: music-storage
  base-url: http://localhost:9000/music-storage

# ==================== 文件上传配置 ====================
file:
  upload:
    max-size: 52428800
    allowed-types: mp3,wav,flac,m4a,aac,ogg,mgg

# ==================== AI服务配置 ====================
ai:
  service:
    provider: dashscope
    # 音频分析策略：description(生成描述) 或 transcribe(转文本)
    analysis-strategy: description
    timeout: 30000

# ==================== 日志配置 ====================
logging:
  level:
    root: INFO
    com.example.personalmusicsystem: DEBUG
  file:
    name: logs/music-system.log

audio:
  analysis:
    python:
      enabled: true
      base-url: http://127.0.0.1:9008
      analyze-path: /analyze
      timeout-ms: 120000

